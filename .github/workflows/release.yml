name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create release and update formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$URL" -o release.tar.gz
          echo "sha256=$(shasum -a 256 release.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Update formula version and sha256
        run: |
          python3 -c "
import re
path = 'Formula/pdftoepub.rb'
content = open(path).read()
ver = '${{ steps.sha.outputs.version }}'
sha = '${{ steps.sha.outputs.sha256 }}'
# Update hardcoded tag version in the url line
content = re.sub(r'(archive/refs/tags/v)[^\"]+(\.tar\.gz)', r'\g<1>' + ver + r'\2', content)
# Update version field
content = re.sub(r'^  version \"[^\"]+\"', '  version \"' + ver + '\"', content, flags=re.MULTILINE)
# Update only the first sha256 (formula-level, not resource blocks)
content = re.sub(r'^  sha256 \"[^\"]+\"', '  sha256 \"' + sha + '\"', content, count=1, flags=re.MULTILINE)
open(path, 'w').write(content)
"

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pdftoepub.rb
          git commit -m "chore: bump formula to ${{ steps.sha.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: "pdftoepub ${{ steps.sha.outputs.version }}"
