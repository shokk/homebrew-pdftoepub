name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create release and update formula
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          curl -sL "$URL" -o release.tar.gz
          echo "sha256=$(shasum -a 256 release.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Update formula version and sha256
        run: |
          sed -i "s|version \".*\"|version \"${{ steps.sha.outputs.version }}\"|" Formula/pdftoepub.rb
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.sha.outputs.sha256 }}\"|" Formula/pdftoepub.rb

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pdftoepub.rb
          git commit -m "chore: bump formula to ${{ steps.sha.outputs.version }}"
          git push origin HEAD:main

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: "pdftoepub ${{ steps.sha.outputs.version }}"
